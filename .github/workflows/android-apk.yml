name: Android APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Resolve app version
        id: app_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            VERSION_NAME="0.1.0"
          fi
          VERSION_CODE="$(date -u +%Y%m%d%H)"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace -PVERSION_NAME=${{ steps.app_version.outputs.version_name }} -PVERSION_CODE=${{ steps.app_version.outputs.version_code }}

      - name: Check release signing secrets
        id: signing
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          HOTNEWS_KEYSTORE_BASE64: ${{ secrets.HOTNEWS_KEYSTORE_BASE64 }}
          HOTNEWS_STORE_PASSWORD: ${{ secrets.HOTNEWS_STORE_PASSWORD }}
          HOTNEWS_KEY_ALIAS: ${{ secrets.HOTNEWS_KEY_ALIAS }}
          HOTNEWS_KEY_PASSWORD: ${{ secrets.HOTNEWS_KEY_PASSWORD }}
        run: |
          if [[ -n "$HOTNEWS_KEYSTORE_BASE64" && -n "$HOTNEWS_STORE_PASSWORD" && -n "$HOTNEWS_KEY_ALIAS" && -n "$HOTNEWS_KEY_PASSWORD" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Release signing secrets are configured. A signed release APK will be built."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Release signing secrets are incomplete. Falling back to the debug APK for this GitHub Release."
          fi

      - name: Decode release keystore
        if: startsWith(github.ref, 'refs/tags/v') && steps.signing.outputs.available == 'true'
        env:
          HOTNEWS_KEYSTORE_BASE64: ${{ secrets.HOTNEWS_KEYSTORE_BASE64 }}
        run: |
          echo "$HOTNEWS_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/hotnews-release.jks"

      - name: Build signed release APK
        if: startsWith(github.ref, 'refs/tags/v') && steps.signing.outputs.available == 'true'
        env:
          HOTNEWS_STORE_PASSWORD: ${{ secrets.HOTNEWS_STORE_PASSWORD }}
          HOTNEWS_KEY_ALIAS: ${{ secrets.HOTNEWS_KEY_ALIAS }}
          HOTNEWS_KEY_PASSWORD: ${{ secrets.HOTNEWS_KEY_PASSWORD }}
        run: >
          ./gradlew :app:assembleRelease --stacktrace
          -PVERSION_NAME=${{ steps.app_version.outputs.version_name }}
          -PVERSION_CODE=${{ steps.app_version.outputs.version_code }}
          -PHOTNEWS_STORE_FILE=$RUNNER_TEMP/hotnews-release.jks
          -PHOTNEWS_STORE_PASSWORD=$HOTNEWS_STORE_PASSWORD
          -PHOTNEWS_KEY_ALIAS=$HOTNEWS_KEY_ALIAS
          -PHOTNEWS_KEY_PASSWORD=$HOTNEWS_KEY_PASSWORD

      - name: Prepare signed release asset
        if: startsWith(github.ref, 'refs/tags/v') && steps.signing.outputs.available == 'true'
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/HotNews-${GITHUB_REF_NAME}.apk"

      - name: Prepare debug release asset
        if: startsWith(github.ref, 'refs/tags/v') && steps.signing.outputs.available != 'true'
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk "release/HotNews-${GITHUB_REF_NAME}-debug.apk"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          generate_release_notes: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HotNews-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
